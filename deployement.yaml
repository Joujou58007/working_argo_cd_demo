---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apollo-spi-mpic
  namespace: default
spec:
  selector:
    matchLabels:
      app: apollo
      hostname: spi-mpic
  template:
    metadata:
      labels:
        app: apollo
        hostname: spi-mpic
    spec:
      nodeSelector:
        kubernetes.io/hostname: spi-mpic
      containers:
      - name: apollo
        image: docker.io/loulou3333444/apollo@sha256:b938ae7cf326a8888db713c886c6e3fb5b6537c66609de96ab96e31b5c95aeb3
        imagePullPolicy: Always
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - mountPath: /dev/spidev0.0
          name: spidev
      volumes:
      - name: spidev
        hostPath:
          path: /dev/spidev0.0
          type: CharDevice
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xeno-mx6qmpic
  namespace: default
spec:
  selector:
    matchLabels:
      app: xeno
      hostname: mx6qmpic
  template:
    metadata:
      labels:
        app: xeno
        hostname: mx6qmpic
    spec:
      nodeSelector:
        kubernetes.io/hostname: mx6qmpic
      containers:
      - name: xeno
        image: docker.io/loulou3333444/clock-test@sha256:fc3e53d2aed8a997fd487942f1f0fa848a43749f4505b72dd72a43468e1fb97b
        env:
        - name: LD_LIBRARY_PATH
          value: "/host/usr/lib:/host/lib"
        securityContext:
          privileged: true
        volumeMounts:
        - name: dev
          mountPath: /dev
        - name: host-usr
          mountPath: /host/usr
          readOnly: true
        - name: host-lib
          mountPath: /host/lib
          readOnly: true
      volumes:
      - name: dev
        hostPath: { path: /dev }
      - name: host-usr
        hostPath: { path: /usr }
      - name: host-lib
        hostPath: { path: /lib } 