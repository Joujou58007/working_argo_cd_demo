apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apollo
  namespace: default
spec:
  selector:
    matchLabels:
      app: apollo
  template:
    metadata:
      labels:
        app: apollo
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - spi-mpic
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - mx6qmpic
      containers:
      - name: apollo
        image: docker.io/loulou3333444/fibonacci_bench@sha256:7bab510ac4d254652bbf08edb12bdfb0ebeb51b6418a2b4ba51eceadbeecbfb3
        imagePullPolicy: Always
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - mountPath: /dev/spidev.0
          name: spidev
      volumes:
      - name: spidev
        hostPath:
          path: /dev/spidev0.0
          type: CharDevice