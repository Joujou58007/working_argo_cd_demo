apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: landing-moon
  namespace: default
spec:
  selector:
    matchLabels:
      app: landing-moon
  template:
    metadata:
      labels:
        app: landing-moon
    spec:
      containers:
      - name: landing-moon
        image: busybox
        command: ["sh", "-c", "echo 'One small step for man, but a giant leap of the project!' && sleep infinity"]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apollo
  namespace: default
spec:
  selector:
    matchLabels:
      app: apollo
  template:
    metadata:
      labels:
        app: apollo
    spec:
      nodeSelector:
        kubernetes.io/hostname: mx6qmpic
      containers:
      - name: apollo
        image: docker.io/loulou3333444/fpga_container@sha256:b8cb056f910d847885f7185339b7a1d0f52f127a516685d6ed647a3e0bc85393
        imagePullPolicy: Always
