apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apollo
  namespace: default
spec:
  selector:
    matchLabels:
      app: apollo
  template:
    metadata:
      labels:
        app: apollo
    spec:
      nodeSelector:
        kubernetes.io/hostname: spi-mpic
      containers:
      - name: apollo
        image: docker.io/loulou3333444/docker.io/loulou3333444/apollo@sha256:60ef4c387a42d6768cc5ab22fe862a840324d28a626fcfb19ae35f29fa09653b
        imagePullPolicy: Always
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - mountPath: /dev/spidev.0
          name: spidev
      volumes:
      - name: spidev
        hostPath:
          path: /dev/spidev0.0
          type: CharDevice