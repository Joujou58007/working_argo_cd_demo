---
# Standerd Continer with FPGA test
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apollo
  namespace: default
spec:
  selector:
    matchLabels:
      app: apollo
      hostname: mx6qmpic
  template:
    metadata:
      labels:
        app: apollo
        hostname: mx6qmpic
    spec:
      nodeSelector:
        kubernetes.io/hostname: mx6qmpic
      containers:
      - name: apollo
        image: docker.io/loulou3333444/fpga_container@sha256:c84376c31ad2f0b8115d6c87d693a168af5a55c9921405c7aa86b61e337d777b
        imagePullPolicy: Always
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - mountPath: /dev/spidev0.0
          name: spidev
      volumes:
      - name: spidev
        hostPath:
          path: /dev/spidev0.0
          type: CharDevice
---
# Standard Container for MPIC 2
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apollo-imx8mp-mpic
  namespace: default
spec:
  selector:
    matchLabels:
      app: apollo
      hostname: imx8mp-mpic
  template:
    metadata:
      labels:
        app: apollo
        hostname: imx8mp-mpic
    spec:
      nodeSelector:
        kubernetes.io/hostname: imx8mp-mpic
      containers:
      - name: apollo-imx8mp-mpic
        image: docker.io/loulou3333444/apollo-mpic2@sha256:b792ec1fbae98ddfcf3a9e57bf753df6530e66eb464f22cd7c66cadaa34ddd2b
        imagePullPolicy: Always
---
# Container with Xenomai On MPIC 1
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xeno-mx6qmpic
  namespace: default
spec:
  selector:
    matchLabels:
      app: xeno
      hostname: mx6qmpic
  template:
    metadata:
      labels:
        app: xeno
        hostname: mx6qmpic
    spec:
      nodeSelector:
        kubernetes.io/hostname: mx6qmpic
      containers:
      - name: xeno
        image: arm32v7/debian:bookworm-slim
        command: ["sleep", "3600"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: hostroot
          mountPath: /hostroot
        - name: dev
          mountPath: /dev
      volumes:
      - name: hostroot
        hostPath:
          path: /
      - name: dev
        hostPath:
          path: /dev