apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apollo-spi-mpic
  namespace: default
spec:
  selector:
    matchLabels:
      app: apollo
      hostname: spi-mpic
  template:
    metadata:
      labels:
        app: apollo
        hostname: spi-mpic
    spec:
      nodeSelector:
        kubernetes.io/hostname: spi-mpic
      containers:
      - name: apollo
        image: docker.io/loulou3333444/apollo@sha256:b938ae7cf326a8888db713c886c6e3fb5b6537c66609de96ab96e31b5c95aeb3
        imagePullPolicy: Always
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - mountPath: /dev/spidev0.0
          name: spidev
      volumes:
      - name: spidev
        hostPath:
          path: /dev/spidev0.0
          type: CharDevice
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xeno-mx6qmpic
  namespace: default
spec:
  selector:
    matchLabels:
      app: xeno
      hostname: mx6qmpic
  template:
    metadata:
      labels:
        app: xeno
        hostname: mx6qmpic
    spec:
      nodeSelector:
        kubernetes.io/hostname: mx6qmpic
      containers:
      - name: xeno
        image: arm32v7/debian:bookworm-slim
        command: ["sleep", "3600"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: hostroot
          mountPath: /hostroot
        - name: dev
          mountPath: /dev
      volumes:
      - name: hostroot
        hostPath:
          path: /
      - name: dev
        hostPath:
          path: /dev