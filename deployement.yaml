apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apollo
  namespace: default
spec:
  selector:
    matchLabels:
      app: apollo
  template:
    metadata:
      labels:
        app: apollo
    spec:
      nodeSelector:
        kubernetes.io/hostname: spi-mpic
      containers:
      - name: apollo
        image: docker.io/loulou3333444/apollo@sha256:189f3a9ab3395011f1a65fb4d754f8b2846cd2990d88b33231c7b9e62ddb68da
        imagePullPolicy: Always
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - mountPath: /dev/spidev.0
          name: spidev
      volumes:
      - name: spidev
        hostPath:
          path: /dev/spidev0.0
          type: CharDevice