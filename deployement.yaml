apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apollo-spi-mpic
  namespace: default
spec:
  selector:
    matchLabels:
      app: apollo
      hostname: spi-mpic
  template:
    metadata:
      labels:
        app: apollo
        hostname: spi-mpic
    spec:
      nodeSelector:
        kubernetes.io/hostname: spi-mpic
      containers:
      - name: apollo
        image: docker.io/loulou3333444/fpga_container@sha256:c84376c31ad2f0b8115d6c87d693a168af5a55c9921405c7aa86b61e337d777b
        imagePullPolicy: Always
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - mountPath: /dev/spidev0.0
          name: spidev
      volumes:
      - name: spidev
        hostPath:
          path: /dev/spidev0.0
          type: CharDevice
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: new-xenomi
  namespace: default
spec:
  selector:
    matchLabels:
      app: new-xenomi
      hostname: new-xenomi
  template:
    metadata:
      labels:
        app: new-xenomi
        hostname: new-xenomi
    spec:
      nodeSelector:
        kubernetes.io/hostname: new-xenomi
      containers:
      - name: latency
        image: arm32v7/debian:bookworm-slim
        command: ["chroot", "/hostroot", "/usr/bin/latency"]
        args: ["-T", "61", "-p", "100", "-h"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: hostroot
          mountPath: /hostroot
        - name: dev
          mountPath: /dev
      volumes:
      - name: hostroot
        hostPath: { path: / }
      - name: dev
        hostPath: { path: /dev }
      restartPolicy: Never
  backoffLimit: 0
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xeno-mx6qmpic
  namespace: default
spec:
  selector:
    matchLabels:
      app: xeno
      hostname: mx6qmpic
  template:
    metadata:
      labels:
        app: xeno
        hostname: mx6qmpic
    spec:
      nodeSelector:
        kubernetes.io/hostname: mx6qmpic
      containers:
      - name: xeno
        image: arm32v7/debian:bookworm-slim
        command: ["sleep", "3600"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: hostroot
          mountPath: /hostroot
        - name: dev
          mountPath: /dev
      volumes:
      - name: hostroot
        hostPath:
          path: /
      - name: dev
        hostPath:
          path: /dev